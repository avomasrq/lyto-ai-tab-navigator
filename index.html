<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyto AI - Full Control Over Your Browser</title>
    <meta name="description" content="Lyto AI is a Chrome extension that gives you full control over your browser. Open and close tabs, scroll, click, fill forms, and interact with every DOM element. Integrates with Google Docs, Gmail, and Google Sheets. Research, automate tasks, and organize your workflow — all inside Chrome." />
    <meta name="author" content="Lyto AI" />
    <meta name="keywords" content="AI, browser extension, Chrome extension, browser control, Google Docs, Gmail, Google Sheets, research, task automation, form filling, sales outreach, productivity" />

    <meta property="og:title" content="Lyto AI - Full Control Over Your Browser" />
    <meta property="og:description" content="A Chrome extension that gives you full control over your browser. Open tabs, fill forms, research topics, automate tasks — all inside Chrome." />
    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@LytoAI" />

    <link rel="canonical" href="https://www.trylyto.com/" />

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>

    <!--
      Static footer fallback. Lyto's homepage is a JS app, so its rendered footer
      (with the privacy/terms links) is invisible to crawlers that don't run JS —
      including Google's OAuth/homepage verification reviewer. This block puts the
      same links into the raw HTML so they are always discoverable and visible.
    -->
    <noscript>
      <footer style="font-family: sans-serif; text-align: center; padding: 24px; line-height: 1.6;">
        <p>
          <strong>Lyto AI</strong> — a Chrome extension and AI assistant that helps you
          control your browser, automate tasks, run research, and connect services like
          Google Docs, Gmail, and Google Sheets. It requests access to user data only to
          perform the actions you ask it to.
        </p>
        <p>
          <a href="https://www.trylyto.com/">Home</a> &middot;
          <a href="https://www.trylyto.com/privacy">Privacy Policy</a> &middot;
          <a href="https://www.trylyto.com/terms">Terms of Service</a>
        </p>
      </footer>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
